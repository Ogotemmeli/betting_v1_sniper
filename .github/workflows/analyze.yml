name: "⚽ v1 Sniper — Solo Calcio"

on:
  schedule:
    - cron: '0 8,11,14,17,20,23 * * *'
  workflow_dispatch:

env:
  ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  BANKROLL: ${{ secrets.BANKROLL || '1000' }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Scrape odds (solo calcio)
        working-directory: src
        run: python scraper.py

      - name: 📊 Analisi arbitraggio + value bet
        working-directory: src
        run: python analyzer.py

      - name: 📬 Notifiche Telegram
        if: env.TELEGRAM_BOT_TOKEN != ''
        working-directory: src
        run: python notifier.py

      - name: 💾 Commit risultati
        run: |
          git config user.name "v1-sniper-bot"
          git config user.email "bot@github-actions"
          mkdir -p reports
          # Crea un log anche se non ci sono opportunità
          echo "Ultimo ciclo: $(date -u +"%Y-%m-%d %H:%M UTC")" > reports/last_run.txt
          git add -A reports/
          timestamp=$(date -u +"%Y-%m-%d %H:%M UTC")
          git diff --cached --quiet || git commit -m "⚽ v1 Sniper: $timestamp"
          git push
